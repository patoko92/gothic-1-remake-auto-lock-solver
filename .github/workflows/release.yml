name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build Linux release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: locksolver-linux-x86_64
          path: target/x86_64-unknown-linux-gnu/release/locksolver

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: locksolver-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/locksolver.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: locksolver-linux-x86_64
          path: artifacts/locksolver-linux-x86_64

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: locksolver-windows-x86_64
          path: artifacts/locksolver-windows-x86_64

      - name: Make Linux binary executable
        run: chmod +x artifacts/locksolver-linux-x86_64/locksolver

      - name: Create Linux tarball
        run: tar -czf locksolver-linux-x86_64.tar.gz -C artifacts/locksolver-linux-x86_64 locksolver

      - name: Create Windows zip
        run: zip -j locksolver-windows-x86_64.zip artifacts/locksolver-windows-x86_64/locksolver.exe

      - name: Create source archive
        run: |
          mkdir -p release-src
          cp -r src Cargo.toml Cargo.lock README.md static release-src/
          tar -czf locksolver-src.tar.gz -C release-src .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ github.ref_name }}"
          body: "Release v${{ github.ref_name }}"
          files: |
            locksolver-linux-x86_64.tar.gz
            locksolver-windows-x86_64.zip
            locksolver-src.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
